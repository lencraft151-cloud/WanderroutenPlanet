name: Android Build

# Baut die WanderPlan-Android-App:
#  - play     -> signiertes AAB für den Google Play Store
#  - sideload -> signierte APK (Selbst-Updater) für den Direkt-Download
# Ohne Signatur-Secrets wird mit der Debug-Signatur gebaut, damit der Build
# nie hart scheitert (das AAB ist dann nur nicht Play-tauglich).

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android-app/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Versionsnummern (aus run_number)
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Keystore aus Secret dekodieren (falls vorhanden)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/wanderplan.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/wanderplan.keystore" >> $GITHUB_ENV
            echo "signed=true" >> $GITHUB_OUTPUT
            echo "Release-Keystore vorhanden – Builds werden signiert."
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            echo "::warning::Kein KEYSTORE_BASE64-Secret gesetzt – es wird mit der Debug-Signatur gebaut (AAB nicht Play-tauglich)."
          fi

      - name: Build AAB (play) + APK (sideload)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle --no-daemon :app:bundlePlayRelease :app:assembleSideloadRelease

      - name: Artefakte umbenennen
        run: |
          mkdir -p "$RUNNER_TEMP/out"
          AAB=$(find app/build/outputs/bundle -name '*.aab' | head -n1)
          APK=$(find app/build/outputs/apk/sideload -name '*.apk' | head -n1)
          echo "AAB=$AAB"
          echo "APK=$APK"
          if [ -n "$AAB" ]; then cp "$AAB" "$RUNNER_TEMP/out/WanderPlan.aab"; fi
          if [ -n "$APK" ]; then cp "$APK" "$RUNNER_TEMP/out/WanderPlan-sideload.apk"; fi
          ls -la "$RUNNER_TEMP/out"

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: wanderplan-android
          path: ${{ runner.temp }}/out/*

      - name: GitHub-Release veröffentlichen
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${{ github.run_number }}"
          gh release create "$TAG" \
            "$RUNNER_TEMP/out/WanderPlan.aab" \
            "$RUNNER_TEMP/out/WanderPlan-sideload.apk" \
            --title "WanderPlan Android v${{ github.run_number }}" \
            --notes "Automatischer Build. Sideload-APK: selbst-aktualisierend. AAB: für den Play Store (signiert: ${{ steps.keystore.outputs.signed }})." \
            --latest
